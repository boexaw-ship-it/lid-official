<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LID — FPL Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; }
body {
  width:1920px; height:1080px;
  overflow:hidden;
  font-family:'Barlow Condensed',sans-serif;
  transform-origin:top left;
  background:transparent;
}

/* ══ TOP BAR ══ */
.top-bar {
  position:absolute;
  top:0; left:0; right:0; height:88px;
  background:linear-gradient(to bottom,rgba(0,0,0,0.92),rgba(0,0,0,0.65));
  border-bottom:3px solid #FF6400;
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 36px;
  z-index: 100;
}
.logo-area { display:flex; align-items:center; gap:12px; }
.logo-txt { font-family:'Bebas Neue',sans-serif; font-size:40px; color:#FF6400; letter-spacing:4px; text-shadow:0 0 20px rgba(255,100,0,0.6); line-height:1; }
.logo-div { width:2px; height:26px; background:rgba(255,100,0,0.4); }
.logo-sub { font-size:11px; font-weight:700; letter-spacing:4px; color:rgba(255,255,255,0.35); text-transform:uppercase; line-height:1.6; }

.gw-center { display:flex; align-items:center; gap:32px; }
.gw-block { text-align:center; }
.gw-label { font-size:10px; font-weight:700; letter-spacing:4px; color:rgba(155,89,255,0.7); text-transform:uppercase; }
.gw-val { font-family:'Bebas Neue',sans-serif; font-size:44px; color:#fff; line-height:1; letter-spacing:2px; }
.gw-val.orange { color:#FF6400; text-shadow:0 0 20px rgba(255,100,0,0.5); }
.gw-val.purple { color:#9b59ff; text-shadow:0 0 20px rgba(155,89,255,0.5); }
.gw-divider { width:1px; height:40px; background:rgba(255,255,255,0.1); }

/* ══ MAIN LAYOUT ══ */
.main-layout {
  position: absolute;
  top: 88px; left: 0; right: 0; bottom: 60px;
  display: flex;
  padding: 40px;
  gap: 40px;
}

/* ══ WEBCAM ZONE ══ */
.webcam-zone {
  width: 640px;
  height: 840px;
  background: rgba(0,0,0,0.4);
  border: 2px solid rgba(255,255,255,0.1);
  position: relative;
  border-radius: 8px;
}
.wc-label {
  position: absolute; bottom: 20px; left: 0; right: 0;
  text-align: center; font-size: 12px; color: rgba(255,255,255,0.2);
  text-transform: uppercase; letter-spacing: 4px;
}

/* ══ PITCH VIEW ══ */
.pitch-container {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.pitch-bg {
  position: absolute; inset: 0;
  background: 
    linear-gradient(rgba(255,100,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,100,0,0.03) 1px, transparent 1px);
  background-size: 50px 50px;
  z-index: -1;
}
.pitch-area {
  flex: 1;
  display: flex;
  flex-direction: column-reverse; /* GK at bottom, FWD at top */
  justify-content: space-around;
  padding: 20px 0;
}
.pitch-row {
  display: flex; justify-content: center; align-items: center; gap: 30px; width: 100%;
}
.p-player {
  display: flex; flex-direction: column; align-items: center; width: 110px;
  animation: pPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) backwards;
}
@keyframes pPop { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

.p-jersey-wrap { position: relative; width: 64px; height: 64px; margin-bottom: 6px; }
.p-jersey { width: 100%; height: 100%; object-fit: contain; }
.p-cap-badge {
  position: absolute; top: -5px; right: -5px;
  background: #FF6400; color: #000; font-size: 11px; font-weight: 900;
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; border: 2px solid #000;
}
.p-name-wrap {
  background: rgba(0,0,0,0.85); border: 1px solid rgba(255,255,255,0.15);
  padding: 3px 10px; border-radius: 4px; width: 100%; text-align: center;
}
.p-name {
  font-size: 12px; font-weight: 700; color: #fff; text-transform: uppercase;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.p-pts { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: #FF6400; margin-top: -1px; }

.bench-container {
  height: 140px; background: rgba(0,0,0,0.5); border-top: 1px solid rgba(255,255,255,0.1);
  display: flex; justify-content: center; align-items: center; gap: 20px; padding: 0 20px;
}
.bench-label {
  position: absolute; bottom: 145px; left: 50%; transform: translateX(-50%);
  font-size: 10px; font-weight: 900; color: rgba(255,255,255,0.3);
  text-transform: uppercase; letter-spacing: 4px;
}

/* ══ TICKER ══ */
.ticker-bar {
  position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
  background: #1a1a1a; border-top: 2px solid #9b59ff;
  display: flex; align-items: center; z-index: 100;
}
.ticker-lbl {
  background: #9b59ff; color: #fff; font-family: 'Bebas Neue', sans-serif;
  font-size: 24px; padding: 0 30px; height: 100%; display: flex; align-items: center;
}
.ticker-track { flex: 1; overflow: hidden; white-space: nowrap; }
.ticker-inner { display: inline-block; animation: ticker 30s linear infinite; padding-left: 100%; }
@keyframes ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-100%); } }
.ticker-item { font-size: 18px; color: #fff; font-weight: 700; margin: 0 40px; }
.ticker-dot { color: #9b59ff; }

/* ══ STATUS ══ */
.json-st { position: absolute; top: 100px; right: 40px; font-size: 12px; color: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div class="top-bar">
  <div class="logo-area">
    <div class="logo-txt">LID⚽</div>
    <div class="logo-div"></div>
    <div class="logo-sub">OFFICIAL<br>@XawBoe</div>
  </div>
  <div class="gw-center">
    <div class="gw-block">
      <div class="gw-label">Gameweek</div>
      <div class="gw-val purple" id="gw-num">GW--</div>
    </div>
    <div class="gw-divider"></div>
    <div class="gw-block">
      <div class="gw-label">GW Points</div>
      <div class="gw-val orange" id="gw-pts">-</div>
    </div>
    <div class="gw-divider"></div>
    <div class="gw-block">
      <div class="gw-label">Overall Rank</div>
      <div class="gw-val" id="overall-rank" style="font-size:28px">-</div>
    </div>
  </div>
  <div style="font-family:'Bebas Neue',sans-serif; font-size:18px; color:#9b59ff; letter-spacing:4px;">🏆 FPL TIPS</div>
</div>

<div class="json-st" id="json-st">⏳ Loading...</div>

<div class="main-layout">
  <div class="webcam-zone">
    <div class="wc-label">[ webcam ]</div>
  </div>

  <div class="pitch-container">
    <div class="pitch-bg"></div>
    <div class="pitch-area" id="pitch-main"></div>
    <div class="bench-label">Substitutes</div>
    <div class="bench-container" id="pitch-bench"></div>
  </div>
</div>

<div class="ticker-bar">
  <div class="ticker-lbl">FPL</div>
  <div class="ticker-track">
    <div class="ticker-inner" id="ticker-content">
      <span class="ticker-item">LID OFFICIAL Channel ကို Subscribe လုပ်ဖို့ မမေ့နဲ့!</span>
      <span class="ticker-dot">◆</span>
      <span class="ticker-item" id="tk-cap">⭐ Captain: -</span>
      <span class="ticker-dot">◆</span>
      <span class="ticker-item" id="tk-tin">🔄 Transfer In: -</span>
      <span class="ticker-dot">◆</span>
      <span class="ticker-item" id="tk-diff">🎯 Differential: -</span>
    </div>
  </div>
</div>

<script>
function autoScale(){
  const s = Math.min(window.innerWidth/1920, window.innerHeight/1080);
  document.body.style.transform = `scale(${s})`;
}
autoScale(); window.addEventListener('resize', autoScale);

const JSON_URL = 'https://boexaw-ship-it.github.io/lid-official/data/fpl.json';

async function loadData() {
  try {
    const res = await fetch(JSON_URL + '?t=' + Date.now());
    const d = await res.json();
    
    document.getElementById('json-st').textContent = '✅ Updated: ' + d.updated.slice(11,16);
    document.getElementById('gw-num').textContent = 'GW' + d.gameweek;
    document.getElementById('gw-pts').textContent = d.gw_points || '0';
    document.getElementById('overall-rank').textContent = (d.overall_rank || 0).toLocaleString();
    
    // Ticker info
    if(d.captain && d.captain.name) document.getElementById('tk-cap').textContent = `⭐ Captain: ${d.captain.name} (${d.captain.gw_points || 0} pts)`;
    if(d.transfer_in && d.transfer_in.name) document.getElementById('tk-tin').textContent = `🔄 Transfer In: ${d.transfer_in.name}`;
    if(d.differential && d.differential.name) document.getElementById('tk-diff').textContent = `🎯 Differential: ${d.differential.name}`;
    
    // Pitch
    renderPitch(d.squad);
  } catch(e) {
    document.getElementById('json-st').textContent = '❌ Error loading data';
    console.error(e);
  }
}

function renderPitch(squad) {
  const main = document.getElementById('pitch-main');
  const bench = document.getElementById('pitch-bench');
  if(!main || !bench) return;
  main.innerHTML = ''; bench.innerHTML = '';
  
  if(!squad || squad.length === 0) {
    main.innerHTML = '<div style="color:rgba(255,255,255,0.1); font-size:40px; font-weight:900; width:100%; text-align:center;">NO SQUAD DATA</div>';
    return;
  }
  
  const starters = squad.filter(p => p.is_starting);
  const subs = squad.filter(p => !p.is_starting);
  
  const byPos = { 1: [], 2: [], 3: [], 4: [] };
  starters.forEach(p => { if(byPos[p.element_type]) byPos[p.element_type].push(p); });
  
  [1, 2, 3, 4].forEach(posType => {
    const row = document.createElement('div');
    row.className = 'pitch-row';
    byPos[posType].forEach(p => { row.appendChild(createPlayerEl(p)); });
    main.appendChild(row);
  });
  
  subs.forEach(p => { bench.appendChild(createPlayerEl(p, true)); });
}

function createPlayerEl(p, isBench = false) {
  const el = document.createElement('div');
  el.className = 'p-player';
  if(isBench) el.style.width = '90px';
  const capBadge = p.is_captain ? '<div class="p-cap-badge">C</div>' : '';
  const pts = p.gw_points !== undefined ? p.gw_points : (p.total_pts || 0);
  
  el.innerHTML = `
    <div class="p-jersey-wrap">
      <img class="p-jersey" src="${p.jersey || ''}" onerror="this.src='https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_0-110.png'">
      ${capBadge}
    </div>
    <div class="p-name-wrap">
      <div class="p-name">${p.name.toUpperCase()}</div>
      <div class="p-pts">${pts} PTS</div>
    </div>
  `;
  return el;
}

loadData();
setInterval(loadData, 60000); // Auto refresh every minute
</script>
</body>
</html>
