<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LID — Watch Along BG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width:1920px; height:1080px;
  overflow:hidden; background:#050a05;
  font-family:'Barlow Condensed',sans-serif;
}

/* Green tint for watch along */
.grid {
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(0,200,80,0.05) 1px, transparent 1px),
    linear-gradient(90deg,rgba(0,200,80,0.05) 1px, transparent 1px);
  background-size:60px 60px;
  animation:gridMove 8s linear infinite;
}
@keyframes gridMove { 0%{transform:translate(0,0)} 100%{transform:translate(60px,60px)} }

.left-bar { position:absolute; left:0; top:0; bottom:0; width:6px; background:linear-gradient(to bottom,transparent,#FF6400,#FF9500,#FF6400,transparent); }
.top-strip { position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#FF6400,#00c850,#FF6400); }
.bottom-strip { position:absolute; bottom:0; left:0; right:0; height:4px; background:linear-gradient(90deg,#FF6400,#00c850,#FF6400); }

/* Dual glow — orange + green */
.glow-orange {
  position:absolute; width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle,rgba(255,100,0,0.10) 0%,transparent 65%);
  top:50%; left:25%; transform:translate(-50%,-50%);
  animation:pulse 3s ease-in-out infinite;
}
.glow-green {
  position:absolute; width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle,rgba(0,200,80,0.08) 0%,transparent 65%);
  top:50%; right:15%; transform:translateY(-50%);
  animation:pulse 3s ease-in-out 1.5s infinite;
}
@keyframes pulse {
  0%,100%{opacity:0.6; transform:translate(-50%,-50%) scale(1)}
  50%{opacity:1; transform:translate(-50%,-50%) scale(1.15)}
}

/* LIVE badge blinking */
.live-badge {
  position:absolute; top:48px; right:60px;
  display:flex; align-items:center; gap:10px;
  background:rgba(220,0,0,0.9); padding:10px 24px;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.live-dot { width:10px; height:10px; border-radius:50%; background:#fff; animation:blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.live-text { font-size:18px; font-weight:900; letter-spacing:4px; color:#fff; }

.logo-area { position:absolute; top:48px; left:60px; display:flex; align-items:center; gap:16px; }
.logo-text { font-family:'Bebas Neue',sans-serif; font-size:56px; color:#FF6400; letter-spacing:4px; text-shadow:0 0 30px rgba(255,100,0,0.6); line-height:1; }
.logo-divider { width:2px; height:40px; background:rgba(255,100,0,0.4); }
.logo-sub { font-size:14px; font-weight:700; letter-spacing:4px; color:rgba(255,255,255,0.4); text-transform:uppercase; line-height:1.6; }

/* Pitch lines decoration */
.pitch-circle {
  position:absolute; top:50%; left:50%;
  transform:translate(-50%,-50%);
  width:400px; height:400px; border-radius:50%;
  border:1px solid rgba(0,200,80,0.06);
}
.pitch-h-line {
  position:absolute; top:50%; left:0; right:0;
  height:1px; background:rgba(0,200,80,0.05);
}

.corner { position:absolute; width:50px; height:50px; }
.corner-tl { top:160px; left:140px; border-top:2px solid rgba(255,100,0,0.5); border-left:2px solid rgba(255,100,0,0.5); }
.corner-tr { top:160px; right:140px; border-top:2px solid rgba(255,100,0,0.5); border-right:2px solid rgba(255,100,0,0.5); }
.corner-bl { bottom:100px; left:140px; border-bottom:2px solid rgba(255,100,0,0.5); border-left:2px solid rgba(255,100,0,0.5); }
.corner-br { bottom:100px; right:140px; border-bottom:2px solid rgba(255,100,0,0.5); border-right:2px solid rgba(255,100,0,0.5); }

.center-zone { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:900px; height:600px; border:1px solid rgba(255,100,0,0.08); display:flex; align-items:center; justify-content:center; }
.center-label { font-size:13px; font-weight:700; letter-spacing:5px; color:rgba(255,100,0,0.12); text-transform:uppercase; }

.bg-text { position:absolute; bottom:-40px; right:40px; font-family:'Bebas Neue',sans-serif; font-size:280px; color:rgba(0,200,80,0.03); line-height:1; user-select:none; }

.bottom-bar { position:absolute; bottom:0; left:0; right:0; height:80px; background:linear-gradient(to right,rgba(255,100,0,0.12),rgba(0,200,80,0.06),transparent); border-top:1px solid rgba(255,100,0,0.15); display:flex; align-items:center; padding:0 60px; gap:40px; }
.bottom-tag { font-size:12px; font-weight:700; letter-spacing:4px; color:rgba(255,100,0,0.7); text-transform:uppercase; }
.bottom-line { flex:1; height:1px; background:linear-gradient(90deg,rgba(255,100,0,0.3),rgba(0,200,80,0.2),transparent); }
.bottom-handle { font-size:14px; font-weight:700; letter-spacing:3px; color:rgba(255,255,255,0.3); }
.bottom-handle span { color:#FF6400; }
</style>
</head>
<body>
<div class="grid"></div>
<div class="glow-orange"></div>
<div class="glow-green"></div>
<div class="left-bar"></div>
<div class="top-strip"></div>
<div class="bottom-strip"></div>
<div class="pitch-circle"></div>
<div class="pitch-h-line"></div>
<div class="bg-text">LIVE</div>

<div class="logo-area">
  <div class="logo-text">LID⚽</div>
  <div class="logo-divider"></div>
  <div class="logo-sub">OFFICIAL<br>@XawBoe</div>
</div>

<div class="live-badge">
  <div class="live-dot"></div>
  <div class="live-text">LIVE</div>
</div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="center-zone"><div class="center-label">[ webcam / content area ]</div></div>

<div class="bottom-bar">
  <div class="bottom-tag">📺 Watch Along</div>
  <div class="bottom-line"></div>
  <div class="bottom-handle"><span>@</span>XawBoe</div>
</div>
</body>
</html>
