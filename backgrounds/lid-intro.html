<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LID OFFICIAL - Intro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Rajdhani:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    font-family: 'Bebas Neue', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* OBS အတွက် transparent background လိုရင် ↓ uncomment လုပ် */
  /* body { background: transparent; } */

  /* ===== BACKGROUND EFFECTS ===== */
  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,100,0,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,100,0,0.05) 1px, transparent 1px);
    background-size: 80px 80px;
    animation: gridMove 8s linear infinite;
  }

  @keyframes gridMove {
    0% { transform: translate(0,0); }
    100% { transform: translate(80px, 80px); }
  }

  .bg-glow {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,100,0,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
    50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  }

  /* ===== MAIN CONTENT ===== */
  .container {
    position: relative;
    text-align: center;
    z-index: 10;
  }

  /* ===== LID LOGO TEXT ===== */
  .logo-wrap {
    position: relative;
    display: inline-block;
    margin-bottom: 10px;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 240px;
    color: #FF6400;
    line-height: 1;
    letter-spacing: 10px;
    text-shadow:
      0 0 40px rgba(255,100,0,0.8),
      0 0 80px rgba(255,100,0,0.4),
      4px 4px 0px #8B3500;
    opacity: 0;
    transform: scale(0.3) rotate(-5deg);
    animation: logoReveal 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
  }

  @keyframes logoReveal {
    0% { opacity: 0; transform: scale(0.3) rotate(-5deg); }
    60% { opacity: 1; transform: scale(1.05) rotate(1deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }

  /* Brush stroke underline */
  .brush-line {
    width: 0%;
    height: 8px;
    background: linear-gradient(90deg, #FF6400, #FF9500, #FF6400);
    border-radius: 4px;
    margin: -20px auto 0;
    box-shadow: 0 0 20px rgba(255,100,0,0.8);
    animation: brushDraw 0.8s ease-out 1.1s forwards;
    position: relative;
  }

  @keyframes brushDraw {
    0% { width: 0%; }
    100% { width: 85%; }
  }

  /* ===== OFFICIAL TEXT ===== */
  .official-text {
    font-family: 'Oswald', sans-serif;
    font-size: 48px;
    color: #fff;
    letter-spacing: 20px;
    text-transform: uppercase;
    margin-top: 20px;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 0.7s ease-out 1.5s forwards;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  @keyframes slideUp {
    0% { opacity: 0; transform: translateY(30px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ===== TAGLINE ===== */
  .tagline {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    color: rgba(255,100,0,0.9);
    letter-spacing: 6px;
    margin-top: 16px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 2.1s forwards;
  }

  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  /* ===== DECORATIVE LINES ===== */
  .deco-left, .deco-right {
    position: absolute;
    top: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #FF6400);
    animation: decoExpand 1s ease-out 2s forwards;
  }

  .deco-left {
    right: calc(100% + 40px);
    background: linear-gradient(270deg, transparent, #FF6400);
  }

  .deco-right {
    left: calc(100% + 40px);
    background: linear-gradient(90deg, transparent, #FF6400);
  }

  @keyframes decoExpand {
    0% { width: 0; }
    100% { width: 300px; }
  }

  /* ===== CORNER ACCENTS ===== */
  .corner {
    position: absolute;
    width: 60px;
    height: 60px;
    opacity: 0;
    animation: cornerShow 0.5s ease-out 2.3s forwards;
  }

  .corner-tl { top: 40px; left: 40px; border-top: 3px solid #FF6400; border-left: 3px solid #FF6400; }
  .corner-tr { top: 40px; right: 40px; border-top: 3px solid #FF6400; border-right: 3px solid #FF6400; }
  .corner-bl { bottom: 40px; left: 40px; border-bottom: 3px solid #FF6400; border-left: 3px solid #FF6400; }
  .corner-br { bottom: 40px; right: 40px; border-bottom: 3px solid #FF6400; border-right: 3px solid #FF6400; }

  @keyframes cornerShow {
    0% { opacity: 0; transform: scale(0.5); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ===== PARTICLES ===== */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #FF6400;
    border-radius: 50%;
    animation: particleFly var(--dur) ease-out var(--delay) forwards;
    opacity: 0;
  }

  @keyframes particleFly {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
  }

  /* ===== FOOTBALL ICON ===== */
  .football {
    position: absolute;
    font-size: 50px;
    opacity: 0;
    animation: ballAppear 0.5s ease-out 1s forwards, ballFloat 3s ease-in-out 1.5s infinite;
    top: -20px;
    right: -60px;
  }

  @keyframes ballAppear {
    0% { opacity: 0; transform: scale(0) rotate(0deg); }
    100% { opacity: 1; transform: scale(1) rotate(360deg); }
  }

  @keyframes ballFloat {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(180deg); }
  }

  /* ===== CHANNEL HANDLE ===== */
  .handle {
    position: absolute;
    bottom: 60px;
    right: 80px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 2.5s forwards;
  }

  .handle span { color: #FF6400; }
</style>
</head>
<body>

  <!-- Background -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <!-- Corner Accents -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Main Content -->
  <div class="container">
    <div class="logo-wrap">
      <div class="logo-text">LID</div>
      <div class="football">⚽</div>
      <div class="deco-left"></div>
      <div class="deco-right"></div>
    </div>
    <div class="brush-line"></div>
    <div class="official-text">Official</div>
    <div class="tagline">⚽ &nbsp; PREDICTION · FPL · WATCH ALONG &nbsp; ⚽</div>
  </div>

  <!-- Channel Handle -->
  <div class="handle"><span>@</span>XawBoe</div>

<script>
  // Spawn particles on logo reveal
  setTimeout(() => {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      p.style.left = cx + 'px';
      p.style.top = cy + 'px';
      const angle = Math.random() * Math.PI * 2;
      const dist = 200 + Math.random() * 400;
      p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
      p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
      p.style.setProperty('--dur', (0.8 + Math.random() * 0.8) + 's');
      p.style.setProperty('--delay', (Math.random() * 0.3) + 's');
      p.style.width = (3 + Math.random() * 5) + 'px';
      p.style.height = p.style.width;
      container.appendChild(p);
    }
  }, 300);
</script>

</body>
</html>
