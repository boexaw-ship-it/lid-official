name: Update FPL Data
on:
  workflow_dispatch:
    inputs:
      team_id:
        description: 'Your FPL Team ID'
        required: true
        default: '0'
      gameweek:
        description: 'Current Gameweek number'
        required: true
        default: '32'
      transfer_in:
        description: 'Player Name (In)'
        required: false
        default: ''
      transfer_out:
        description: 'Player Name (Out)'
        required: false
        default: ''
      differential:
        description: 'Differential Player'
        required: false
        default: ''

jobs:
  update-fpl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Fetch FPL Data
        run: |
          mkdir -p data
          curl -s "https://fantasy.premierleague.com/api/bootstrap-static/" -H "User-Agent: Mozilla/5.0" -o data/fpl_bootstrap.json
          curl -s "https://fantasy.premierleague.com/api/entry/${{ github.event.inputs.team_id }}/" -H "User-Agent: Mozilla/5.0" -o data/fpl_team.json
          curl -s "https://fantasy.premierleague.com/api/entry/${{ github.event.inputs.team_id }}/history/" -H "User-Agent: Mozilla/5.0" -o data/fpl_history.json
          curl -s "https://fantasy.premierleague.com/api/entry/${{ github.event.inputs.team_id }}/event/${{ github.event.inputs.gameweek }}/picks/" -H "User-Agent: Mozilla/5.0" -o data/fpl_picks.json
          curl -s "https://fantasy.premierleague.com/api/event/${{ github.event.inputs.gameweek }}/live/" -H "User-Agent: Mozilla/5.0" -o data/fpl_live.json

      - name: Build fpl.json
        run: |
          python3 << 'PYEOF'
          import json
          from datetime import datetime, timezone

          def player_photo(code):
              return f"https://resources.premierleague.com/premierleague/photos/players/110x140/p{code}.png"
          def jersey_url(team_code):
              return f"https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_{team_code}-110.png"
          def gk_jersey_url(team_code):
              return f"https://fantasy.premierleague.com/dist/img/shirts/standard/shirt_{team_code}_1-110.png"

          with open('data/fpl_team.json') as f: team = json.load(f)
          with open('data/fpl_history.json') as f: history = json.load(f)
          with open('data/fpl_picks.json') as f: picks_data = json.load(f)
          with open('data/fpl_bootstrap.json') as f: bootstrap = json.load(f)
          with open('data/fpl_live.json') as f: live_data = json.load(f)

          players = {p['id']: p for p in bootstrap['elements']}
          teams_map = {t['id']: t for t in bootstrap['teams']}
          live_elements = {e['id']: e.get('stats', {}) for e in live_data.get('elements', [])}
          
          gw_history = history.get('current', [])
          current_gw = gw_history[-1] if gw_history else {}
          picks = picks_data.get('picks', [])
          
          captain_id = next((p['element'] for p in picks if p.get('is_captain')), None)
          vice_id = next((p['element'] for p in picks if p.get('is_vice_captain')), None)
          pos_names = {1:'GK', 2:'DEF', 3:'MID', 4:'FWD'}

          def build_player(pid, extra={}):
              p = players.get(pid, {})
              t = teams_map.get(p.get('team', 0), {})
              tc = t.get('code', 0)
              et = p.get('element_type', 0)
              return {
                  "id": pid,
                  "name": p.get('web_name', ''),
                  "team": t.get('short_name', ''),
                  "team_code": tc,
                  "position": pos_names.get(et, ''),
                  "element_type": et,
                  "photo": player_photo(p.get('code', pid)),
                  "jersey": gk_jersey_url(tc) if et == 1 else jersey_url(tc),
                  "price": round(p.get('now_cost', 0) / 10, 1),
                  "total_pts": p.get('total_points', 0),
                  "gw_points": live_elements.get(pid, {}).get('total_points', 0),
                  **extra
              }

          starting = [p for p in picks if p.get('position', 0) <= 11]
          starters_by_type = {1:0, 2:0, 3:0, 4:0}
          for p in starting:
              pl = players.get(p['element'], {})
              et = pl.get('element_type', 0)
              starters_by_type[et] = starters_by_type.get(et, 0) + 1
          formation = f"{starters_by_type[2]}-{starters_by_type[3]}-{starters_by_type[4]}"

          squad_list = []
          for p in picks:
              squad_list.append(build_player(p['element'], {
                  "is_captain": p.get('is_captain', False),
                  "is_vice": p.get('is_vice_captain', False),
                  "multiplier": p.get('multiplier', 1),
                  "pick_position": p.get('position', 0),
                  "is_starting": p.get('position', 0) <= 11
              }))

          def find_player(name):
              if not name: return {"name": name}
              nl = name.lower()
              for p in bootstrap['elements']:
                  if nl in p.get('web_name','').lower() or nl in p.get('second_name','').lower():
                      return build_player(p['id'])
              return {"name": name}

          out = {
              "updated": datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "gameweek": int("${{ github.event.inputs.gameweek }}"),
              "team_name": team.get('name', ''),
              "manager": f"{team.get('player_first_name','')} {team.get('player_last_name','')}",
              "overall_rank": team.get('summary_overall_rank', 0),
              "total_points": team.get('summary_overall_points', 0),
              "team_value": round(team.get('last_deadline_value', 0) / 10, 1),
              "bank": round(team.get('last_deadline_bank', 0) / 10, 1),
              "gw_points": current_gw.get('points', 0),
              "gw_rank": current_gw.get('rank', 0),
              "formation": formation,
              "captain": build_player(captain_id) if captain_id else {},
              "vice_captain": build_player(vice_id) if vice_id else {},
              "transfer_in": find_player("${{ github.event.inputs.transfer_in }}"),
              "transfer_out": find_player("${{ github.event.inputs.transfer_out }}"),
              "differential": find_player("${{ github.event.inputs.differential }}"),
              "squad": squad_list
          }
          with open('data/fpl.json', 'w') as f: json.dump(out, f, indent=2)
          PYEOF

      - name: Commit and Push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/fpl.json
          git diff --staged --quiet || git commit -m "Update FPL data - GW${{ github.event.inputs.gameweek }}"
          git push
