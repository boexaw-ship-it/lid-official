name: Update Prediction Data

on:
  workflow_dispatch:
    inputs:
      date_from:
        description: 'From date (e.g. 2025-03-22) — Saturday'
        required: true
        default: ''
      date_to:
        description: 'To date (e.g. 2025-03-23) — Sunday (same as date_from for one day)'
        required: true
        default: ''
      competition:
        description: 'Competition: PL = Premier League, CL = Champions League, ALL = Both'
        required: true
        default: 'PL'
      gameweek:
        description: 'Gameweek label (e.g. 32) — for display only'
        required: false
        default: ''
      extra_matches:
        description: |
          Extra manual matches (optional):
          [{"competition":"Other","home":"TEAM A","away":"TEAM B","date":"2025-04-08T19:00:00Z","gw":"R1"}]
        required: false
        default: '[]'

jobs:
  update-prediction:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Premier League Matches
        if: ${{ github.event.inputs.competition == 'PL' || github.event.inputs.competition == 'ALL' }}
        run: |
          curl -s \
            "https://api.football-data.org/v4/competitions/PL/matches?dateFrom=${{ github.event.inputs.date_from }}&dateTo=${{ github.event.inputs.date_to }}" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o data/pl_raw.json
          echo "✅ PL matches fetched"
          cat data/pl_raw.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'   Found: {len(d.get(\"matches\",[]))} matches')"

      - name: Fetch Champions League Matches
        if: ${{ github.event.inputs.competition == 'CL' || github.event.inputs.competition == 'ALL' }}
        run: |
          curl -s \
            "https://api.football-data.org/v4/competitions/CL/matches?dateFrom=${{ github.event.inputs.date_from }}&dateTo=${{ github.event.inputs.date_to }}" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o data/cl_raw.json
          echo "✅ CL matches fetched"
          cat data/cl_raw.json | python3 -c "import json,sys; d=json.load(sys.stdin); print(f'   Found: {len(d.get(\"matches\",[]))} matches')"

      - name: Fetch Recent Results (for form)
        run: |
          curl -s \
            "https://api.football-data.org/v4/competitions/PL/matches?status=FINISHED&limit=40" \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_KEY }}" \
            -o data/recent_raw.json

      - name: Build prediction.json
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime, timezone, timedelta

          COMP      = "${{ github.event.inputs.competition }}"
          DATE_FROM = "${{ github.event.inputs.date_from }}"
          DATE_TO   = "${{ github.event.inputs.date_to }}"
          GW_LABEL  = "${{ github.event.inputs.gameweek }}"

          # Myanmar time UTC+6:30
          MMT = timezone(timedelta(hours=6, minutes=30))

          def to_mmt(utc_str):
            try:
              dt = datetime.fromisoformat(utc_str.replace('Z','+00:00'))
              mmt = dt.astimezone(MMT)
              days = {0:'Mon',1:'Tue',2:'Wed',3:'Thu',4:'Fri',5:'Sat',6:'Sun'}
              return {
                "display": mmt.strftime(f"{days[mmt.weekday()]} %d %b · %H:%M MMT"),
                "date":    mmt.strftime('%Y-%m-%d'),
                "time":    mmt.strftime('%H:%M'),
                "weekday": days[mmt.weekday()],
                "utc":     utc_str
              }
            except:
              return {"display":utc_str,"date":"","time":"","weekday":"","utc":utc_str}

          # ── Build team form from recent PL results ──
          team_form = {}
          with open('data/recent_raw.json') as f:
            recent = json.load(f)
          for m in recent.get('matches',[]):
            sc  = m.get('score',{}).get('fullTime',{})
            hs  = sc.get('home')
            aws = sc.get('away')
            if hs is None or aws is None: continue
            hid = m['homeTeam']['id']
            aid = m['awayTeam']['id']
            if hid not in team_form: team_form[hid] = []
            if aid not in team_form: team_form[aid] = []
            if hs > aws:
              team_form[hid].append('W'); team_form[aid].append('L')
            elif hs < aws:
              team_form[hid].append('L'); team_form[aid].append('W')
            else:
              team_form[hid].append('D'); team_form[aid].append('D')

          def get_form(tid):
            f = team_form.get(tid,[])
            last3 = f[-3:]
            return last3 + ['?']*(3-len(last3))

          # ── Process matches from raw file ──
          def process_matches(filepath, comp_name, comp_label):
            if not os.path.exists(filepath):
              return []
            with open(filepath) as f:
              data = json.load(f)
            out = []
            mid_offset = len(out)
            for i, m in enumerate(data.get('matches',[])):
              h  = m['homeTeam']
              a  = m['awayTeam']
              dt = to_mmt(m.get('utcDate',''))
              stage = m.get('stage','')
              stage_lbl = ''
              if 'QUARTER' in stage:   stage_lbl = 'QF'
              elif 'SEMI'   in stage:  stage_lbl = 'SF'
              elif 'FINAL'  in stage and 'SEMI' not in stage: stage_lbl = 'F'
              elif 'ROUND_OF_16' in stage: stage_lbl = 'R16'
              elif 'GROUP'  in stage:  stage_lbl = 'GS'
              gw = m.get('matchday') or stage_lbl or GW_LABEL or '-'
              out.append({
                "id":           i + 1 + (100 if comp_label=='CL' else 0),
                "competition":  comp_name,
                "comp_label":   comp_label,
                "gw":           gw,
                "stage":        stage_lbl,
                "home":         h.get('shortName', h.get('name','')),
                "home_full":    h.get('name',''),
                "home_crest":   h.get('crest',''),
                "home_id":      h.get('id',0),
                "away":         a.get('shortName', a.get('name','')),
                "away_full":    a.get('name',''),
                "away_crest":   a.get('crest',''),
                "away_id":      a.get('id',0),
                "date_utc":     m.get('utcDate',''),
                "date_mmt":     dt['display'],
                "date_fmt":     dt['display'],
                "match_date":   dt['date'],
                "match_time":   dt['time'],
                "weekday":      dt['weekday'],
                "status":       m.get('status','SCHEDULED'),
                "home_form":    get_form(h.get('id',0)) if comp_label=='PL' else ['?','?','?'],
                "away_form":    get_form(a.get('id',0)) if comp_label=='PL' else ['?','?','?'],
                "venue":        m.get('venue','')
              })
            return out

          # ── Collect all matches ──
          all_matches = []

          if COMP in ('PL','ALL'):
            pl = process_matches('data/pl_raw.json','Premier League','PL')
            all_matches += pl
            print(f"✅ PL: {len(pl)} matches")

          if COMP in ('CL','ALL'):
            cl = process_matches('data/cl_raw.json','Champions League','CL')
            all_matches += cl
            print(f"✅ CL: {len(cl)} matches")

          # Sort by UTC date
          all_matches.sort(key=lambda x: x['date_utc'])

          # Reassign IDs after sort
          for i,m in enumerate(all_matches):
            m['id'] = i + 1

          # ── Extra manual matches ──
          extra_raw = '${{ github.event.inputs.extra_matches }}'
          try:
            extra_list = json.loads(extra_raw) if extra_raw.strip() not in ['','[]'] else []
          except:
            extra_list = []

          for i,m in enumerate(extra_list):
            dt = to_mmt(m.get('date',''))
            all_matches.append({
              "id":           len(all_matches)+1,
              "competition":  m.get('competition','Other'),
              "comp_label":   'OTHER',
              "gw":           m.get('gw','-'),
              "stage":        '',
              "home":         m.get('home','').upper(),
              "home_full":    m.get('home','').upper(),
              "home_crest":   m.get('home_crest',''),
              "home_id":      0,
              "away":         m.get('away','').upper(),
              "away_full":    m.get('away','').upper(),
              "away_crest":   m.get('away_crest',''),
              "away_id":      0,
              "date_utc":     m.get('date',''),
              "date_mmt":     dt['display'],
              "date_fmt":     dt['display'],
              "match_date":   dt['date'],
              "match_time":   dt['time'],
              "weekday":      dt['weekday'],
              "status":       "SCHEDULED",
              "home_form":    m.get('home_form',['?','?','?']),
              "away_form":    m.get('away_form',['?','?','?']),
              "venue":        m.get('venue','')
            })

          # ── Summary by day ──
          days_summary = {}
          for m in all_matches:
            d = m['weekday'] + ' ' + m['match_date']
            if d not in days_summary: days_summary[d] = 0
            days_summary[d] += 1

          # ── Output ──
          out = {
            "updated":      datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
            "updated_mmt":  datetime.now(MMT).strftime("%d %b %Y · %H:%M MMT"),
            "date_from":    DATE_FROM,
            "date_to":      DATE_TO,
            "gameweek":     GW_LABEL,
            "competition":  COMP,
            "total":        len(all_matches),
            "days_summary": days_summary,
            "matches":      all_matches
          }

          with open('data/prediction.json','w') as f:
            json.dump(out, f, indent=2, ensure_ascii=False)

          print(f"\n📋 prediction.json — {len(all_matches)} total matches")
          print(f"   Date range: {DATE_FROM} → {DATE_TO}")
          for d,cnt in days_summary.items():
            print(f"   {d}: {cnt} matches")
          print()
          for m in all_matches:
            print(f"   [{m['competition']:<18}] {m['home']:<15} vs {m['away']:<15} — {m['date_mmt']}")
          PYEOF

      - name: Cleanup
        run: |
          rm -f data/pl_raw.json data/cl_raw.json data/recent_raw.json

      - name: Commit and Push
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git add data/prediction.json
          git diff --staged --quiet || git commit -m "Prediction: ${{ github.event.inputs.competition }} ${{ github.event.inputs.date_from }}→${{ github.event.inputs.date_to }}"
          git push
